<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="app-version" content="2026-06-18-1649">
  <title>16.0 文案优化工作台</title>
  <style>
    :root {
      --ink: #111111;
      --text: #242424;
      --muted: #7c7f84;
      --quiet: #a7aaae;
      --line: #e5e6e8;
      --line-soft: #eeeeef;
      --bg: #eff0f2;
      --panel: rgba(255, 255, 255, 0.86);
      --card: #ffffff;
      --chip: #f5f5f4;
      --focus: rgba(17, 17, 17, 0.12);
      --shadow: 0 24px 70px rgba(18, 18, 18, 0.08);
      --small-shadow: 0 12px 34px rgba(18, 18, 18, 0.06);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 48% -4%, rgba(140, 168, 214, 0.26), transparent 27%),
        linear-gradient(180deg, #f6f6f5 0%, var(--bg) 100%);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    button,
    textarea,
    input,
    select {
      font: inherit;
    }

    button {
      color: inherit;
    }

    .shell {
      width: min(1280px, calc(100vw - 48px));
      min-height: calc(100vh - 80px);
      margin: 40px auto;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 26px;
      background: rgba(248, 248, 247, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .topbar {
      height: 76px;
      display: grid;
      grid-template-columns: 220px 1fr 220px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: rgba(250, 250, 249, 0.62);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 28px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .brand-logo {
      width: 28px;
      height: 28px;
      display: block;
      flex: 0 0 28px;
      object-fit: contain;
      border-radius: 8px;
    }

    .breadcrumb {
      color: var(--quiet);
      font-size: 13px;
    }

    .breadcrumb strong {
      margin-left: 6px;
      color: var(--ink);
      font-weight: 680;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding-right: 24px;
    }

    .icon-btn,
    .btn {
      border: 1px solid var(--line-soft);
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 6px 18px rgba(18, 18, 18, 0.04);
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 720;
    }

    .btn {
      height: 42px;
      border-radius: 999px;
      padding: 0 18px;
      font-size: 13px;
      font-weight: 720;
    }

    .icon-btn:hover,
    .btn:hover {
      transform: translateY(-1px);
      border-color: #d6d7da;
      background: #fff;
    }

    .btn.primary {
      border-color: #111;
      background: #111;
      color: #fff;
    }

    .layout {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      min-height: calc(100vh - 156px);
    }

    .sidebar {
      background: rgba(245, 245, 244, 0.62);
    }

    .sidebar {
      padding: 26px 22px;
      border-right: 1px solid var(--line);
    }

    .nav-title,
    .panel-title {
      margin: 0 0 14px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .category-list {
      display: grid;
      gap: 8px;
    }

    .category-card {
      width: 100%;
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 10px;
      align-items: start;
      border: 1px solid transparent;
      border-radius: 16px;
      background: transparent;
      padding: 11px 10px;
      text-align: left;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .category-card:hover {
      background: rgba(255, 255, 255, 0.64);
    }

    .category-card.active {
      border-color: var(--line);
      background: #fff;
      box-shadow: var(--small-shadow);
    }

    .category-index {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: #ececeb;
      color: #54565a;
      font-size: 12px;
      font-weight: 760;
    }

    .category-card.active .category-index {
      background: #111;
      color: #fff;
    }

    .category-name {
      display: block;
      color: var(--ink);
      font-size: 14px;
      font-weight: 760;
      line-height: 1.25;
    }

    .category-desc {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .workspace {
      padding: 28px;
    }

    .intro {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
      padding: 0 25px;
      margin-bottom: 20px;
    }

    .intro h1 {
      margin: 0;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      font-size: clamp(30px, 4vw, 52px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .intro p {
      max-width: 440px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .editor-card,
    .result-card {
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-xl);
      background: var(--card);
      box-shadow: var(--small-shadow);
    }

    .editor-card {
      padding: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #54565a;
      font-size: 12px;
      font-weight: 760;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      outline: none;
      background: #f8f8f7;
      color: var(--ink);
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    input {
      height: 48px;
      padding: 0 14px;
    }

    .custom-select {
      position: relative;
    }

    .scene-native {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .select-trigger {
      width: 100%;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #f8f8f7;
      padding: 0 14px;
      color: var(--ink);
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .select-trigger:hover {
      border-color: #d1d3d6;
      background: #fff;
    }

    .select-trigger:focus-visible,
    .select-trigger[aria-expanded="true"] {
      outline: none;
      border-color: #bfc1c4;
      background: #fff;
      box-shadow: 0 0 0 5px var(--focus);
    }

    .select-chevron {
      color: #777a7f;
      font-size: 15px;
      line-height: 1;
      transition: transform 0.18s ease;
    }

    .select-trigger[aria-expanded="true"] .select-chevron {
      transform: rotate(180deg);
    }

    .select-popover {
      position: absolute;
      z-index: 30;
      top: calc(100% + 8px);
      right: 0;
      left: 0;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 18px 46px rgba(18, 18, 18, 0.14);
      padding: 6px;
    }

    .select-popover[hidden] {
      display: none;
    }

    .select-list {
      max-height: 232px;
      overflow-y: auto;
      display: grid;
      gap: 3px;
    }

    .select-option {
      width: 100%;
      min-height: 42px;
      border: 0;
      border-radius: 11px;
      background: transparent;
      padding: 9px 12px;
      color: #35373b;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .select-option:hover,
    .select-option:focus-visible {
      outline: none;
      background: #f1f1f0;
    }

    .select-option[aria-selected="true"] {
      background: #111;
      color: #fff;
      font-weight: 720;
    }

    textarea {
      min-height: 132px;
      resize: vertical;
      padding: 14px;
      line-height: 1.65;
    }

    #copyInput {
      min-height: 158px;
      font-size: 16px;
    }

    input:focus,
    textarea:focus {
      border-color: #bfc1c4;
      background: #fff;
      box-shadow: 0 0 0 5px var(--focus);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .result-card {
      margin-top: 20px;
      padding: 24px;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .result-box {
      min-height: 260px;
      max-height: none;
      overflow: auto;
      white-space: pre-wrap;
      border: 1px solid var(--line-soft);
      border-radius: 18px;
      background: #f8f8f7;
      padding: 14px;
      color: #303236;
      font-size: 13px;
      line-height: 1.72;
    }

    .empty {
      color: var(--quiet);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: #111;
      color: #fff;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.18);
      padding: 10px 16px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    @media (max-width: 1100px) {
      .shell {
        width: min(100vw - 28px, 920px);
        margin: 20px auto;
      }

      .topbar {
        grid-template-columns: 1fr auto;
      }

      .brand {
        padding-left: 20px;
      }

      .breadcrumb {
        display: none;
      }

      .layout {
        grid-template-columns: 220px minmax(0, 1fr);
      }

    }

    @media (max-width: 760px) {
      .shell {
        width: min(100vw - 18px, 620px);
        margin: 9px auto;
        border-radius: 22px;
      }

      .topbar {
        height: auto;
        grid-template-columns: 1fr;
        gap: 14px;
        padding: 18px;
      }

      .brand {
        padding-left: 0;
      }

      .toolbar {
        justify-content: flex-start;
        padding-right: 0;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .workspace,
      .sidebar {
        padding: 18px;
      }

      .intro {
        grid-template-columns: 1fr;
        padding: 0 19px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .editor-card {
        padding: 18px;
      }
    }
  </style>
</head>

      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function getMaxLength(limit) {
      const match = limit.match(/(\d+)\s*字/);
      return match ? Number(match[1]) : 0;

        .replace(/方便下次找到喜欢的商品/g, "方便下次查找")
        .replace(/预约快递上门取件/g, "预约上门取件")
        .replace(/快速扫码识别商品/g, "快速扫码")
        .replace(/夏天出门更防晒/g, "出门更防晒")
        .replace(/继续完成付款/g, "继续付款")
        .replace(/[，,。；;：:、\s]+$/g, "")
        .trim();
      if (!max || value.length <= max) return value;

      const clauses = value.split(/[，；。]/).map((item) => item.trim()).filter(Boolean);
      const firstClause = clauses.find((item) => item.length <= max);
      return firstClause || "";
    }

    function uniqueList(items) {
      const seen = new Set();
      return items.filter((item) => {
        const value = item.trim();
        if (!value || seen.has(value)) return false;
        seen.add(value);
        return true;
      });
    }

    function normalizeCopy(source) {
      return source
        .replace(/到帐/g, "到账")
        .replace(/错误代码[：:]?\s*[a-zA-Z0-9xX._-]+/g, "")
        .replace(/由于您的?错误操作[，,]?/g, "")
        .replace(/实际结算价以详情页为准/g, "到手价以下单页为准")
        .replace(/后台流转中?|后台流转/g, "处理中")
        .replace(/为您/g, "为你")
        .replace(/您的/g, "你的")
        .replace(/您/g, "你")
        .replace(/平台已/g, "已")
        .replace(/买买买/g, "去看看")
        .replace(/[，,。；;：:、\s]+$/g, "")
        .trim();
    }

    function parseKeepTerms(value) {
      return uniqueList(value
        .split(/[\n,，、；;]+/)
        .map((item) => item.trim())
        .filter(Boolean));
    }

    function ensureKeepTerms(text, keepTerms) {
      const missing = keepTerms.filter((term) => !text.includes(term));
      if (!missing.length) return text;
      const required = missing.join("、");
      return text ? `${required}：${text}` : required;
    }

    function inferArrival(source, context) {
      const text = normalizeCopy(`${source} ${context}`);
      const match = text.match(/(退款|货款|款项|钱)?(?:预计|将会|将|会)?(?:在)?\s*(\d+\s*(?:个)?(?:工作日|天|小时|分钟))(?:之)?后(?:可)?到账/);
      if (!match) return null;
      const originalSubject = match[1] || "";
      const subject = originalSubject === "退款" || originalSubject === "货款" ? originalSubject : "款项";
      return { subject, time: match[2].replace(/\s+/g, "") };
    }

    function arrivalCandidates(arrival) {
      return [
        `${arrival.subject}预计${arrival.time}后到账，有进展会及时通知你`,
        `${arrival.subject}将在${arrival.time}后到账，有进展会及时通知你`,
        `预计${arrival.time}后到账`,
        `${arrival.subject}预计${arrival.time}后到账`
      ];
    }

    function inferNotificationCampaign(source, context) {
      const text = normalizeCopy(`${source} ${context}`);
      if (!/(?:开启|打开).{0,4}(?:消息)?通知/.test(text)) return null;
      const rewardMatch = text.match(/(?:领|领取|得|获得)\s*([^，,。；\s]{2,12}(?:红包|优惠券|好礼|奖励))/);
      if (!rewardMatch) return null;
      return { subject: "消息通知", reward: rewardMatch[1].replace(/\s+/g, "") };
    }

    function notificationCampaignCandidates(campaign) {
      return [
        `开启消息通知，${campaign.reward}不错过`,
        `开启消息通知，领取${campaign.reward}`,
        `打开消息通知，${campaign.reward}等你领`,
        `开启通知，领${campaign.reward}`
      ];
    }

    function inferCore(source, context, keep) {
      if (keep.trim()) return keep.trim();
      const text = `${source} ${context}`;
      const version = text.match(/京东\s*(\d+(?:\.\d+)*)\s*(?:版本|系统|版)?|((?:\d+(?:\.\d+)*))\s*(?:版本|系统|版)/);
      if (version) return `京东${version[1] || version[2]}`;
      const coupon = text.match(/\d+(?:\.\d+)?\s*元优惠券|优惠券|红包|补贴|PLUS|AI购助手|浏览记录|定位服务|购物车|退款|退货申请|收货地址|问大家/);
      if (coupon) return coupon[0].replace(/\s+/g, "");
      const price = text.match(/(?:￥|¥)?\s*(\d+(?:\.\d+)?)\s*元/);
      if (price) return `${price[1]}元`;
      return normalizeCopy(source) || "这项内容";
    }

    function inferOffer(source, context, benefit) {
      const text = `${source} ${context} ${benefit}`;
      const claimedOffer = text.match(/(?:领|领取)\s*([^，,。；\s]{2,16}(?:优惠券|红包))/i);
      if (claimedOffer) return claimedOffer[1].replace(/\s+/g, "");
      const match = text.match(/\d+(?:\.\d+)?\s*元优惠券|\d+(?:\.\d+)?\s*元红包|[^，,。；\s]{2,12}优惠券|优惠券|红包/);
      return match ? match[0].replace(/\s+/g, "") : "";
    }

    function inferChannel(source, context) {
      const text = `${source} ${context}`;
      const aiMatch = text.match(/ai购(?:助手)?/i);
      if (aiMatch) return aiMatch[0].includes("助手") ? "AI购助手" : "AI购";
      const match = text.match(/小时购|PLUS|京东直播/);
      return match ? match[0] : "";
    }

    function inferTouchpointRole(limit, context, source) {
      const text = `${limit} ${context} ${source}`;
      if (/会场头图|头图|banner|Banner/.test(text)) return "头图定调";
      if (/楼层|频道|入口|导流|清单|榜单/.test(text)) return "分类导流";
      if (/商品卡|主图|商详|卖点|推荐理由/.test(text)) return "商品转化";
      if (/Push|push|弹窗|Toast|toast|消息提醒/.test(text)) return "即时触达";
      if (/权益|规则|说明|服务承诺/.test(text)) return "权益解释";
      if (/按钮/.test(text)) return "操作指令";
      return "信息告知";
    }

    function analyzeCommerceRisk(source, context, keepTerms) {
      const text = `${source} ${context}`;
      const groups = [
        { label: "绝对化或无证据领先", pattern: /全网最低|历史最低|最低价|销量第一|好评第一|行业第一|唯一|顶级|极致|完美|无敌|100%|国家级|特效/g },
        { label: "过度服务承诺", pattern: /必达|必赔|无条件|随时退|永久保修|保证有效|一定见效/g },
        { label: "功效或医疗暗示", pattern: /治疗|治愈|康复|矫正|控糖|减脂|抗衰|助眠|养胃|提升免疫力|增强免疫力|缓解疼痛|修复屏障/g }
      ];
      const hits = groups.flatMap((group) => {
        const matches = text.match(group.pattern) || [];
        return matches.map((term) => ({ label: group.label, term }));
      });
      const evidence = /活动规则|价格口径|服务规则|检测报告|认证编号|批准文号|数据来源|以.{0,10}为准|可展示\s*\d+%/.test(text);
      const riskyKeepTerms = keepTerms.filter((term) => hits.some((hit) => term.includes(hit.term) || hit.term.includes(term)));
      return {
        hits,
        evidence,
        blocked: hits.length > 0 && !evidence,
        riskyKeepTerms,
        note: !hits.length
          ? ""
          : evidence
          ? `已识别“${uniqueList(hits.map((hit) => hit.term)).join("、")}”，上线前请核验对应证据。`
          : `“${uniqueList(hits.map((hit) => hit.term)).join("、")}”缺少可核验依据，已改为安全表达。`
      };
    }

    function inferSafeSubject(data) {
      const safeKeep = data.keepTerms.find((term) => !data.risk.riskyKeepTerms.includes(term));
      if (safeKeep) return safeKeep;
      const match = `${data.source} ${data.context}`.match(/[^\s，,。；;]{2,12}(?:食品|饮品|器材|商品|服务|优惠券|红包)/);
      return match ? match[0] : (data.core && data.core.length <= 14 ? data.core : "商品");
    }

    function complianceCandidates(data) {
      if (data.risk.riskyKeepTerms.length) {
        const terms = data.risk.riskyKeepTerms.join("、");
        return [
          `“${terms}”需补充可核验依据`,
          `暂不建议使用“${terms}”`,
          `核验规则后再使用“${terms}”`
        ];
      }
      const subject = inferSafeSubject(data);
      const hasHealthRisk = data.risk.hits.some((hit) => hit.label === "功效或医疗暗示");
      if (hasHealthRisk) {
        return [
          `${subject}，适合日常使用`,
          `了解${subject}的规格与使用方式`,
          `${subject}，具体信息以商品页为准`,
          `先看${subject}是否适合你`
        ];
      }
      return [
        `${subject}，具体权益以页面规则为准`,
        `查看${subject}适用规则`,
        `${subject}，下单前请确认适用范围`,
        `了解${subject}的具体规则`
      ];
    }

    function sceneSeedCandidates(data) {
      const evidence = `${data.source} ${data.context}`;
      const cue = ["新手", "周末", "通勤", "出游", "宅家", "送礼", "搬家"].find((item) => evidence.includes(item));
      return uniqueList([
        cue === "新手" ? `新手必看的${data.core}清单` : "",
        cue && cue !== "新手" ? `${cue}，${data.core}先备好` : "",
        `${data.core}清单，${data.benefit}`,
        `选好${data.core}，${data.benefit}`,
        `${data.benefit}，看看${data.core}`
      ]);
    }

    function marketingClaimCandidates(data) {
      const offer = data.offer || data.core;
      if (data.channel) {
        return [
          `上${data.channel}，领${offer}`,
          `打开${data.channel}，领取${offer}`,
          `去${data.channel}领${offer}`,
          `${data.channel}${offer}，点击领取`
        ];
      }
      return [
        `领取${offer}`,
        `${offer}待领取`,
        `${offer}，点击领取`,
        `领${offer}，下单更省`
      ];
    }

    function inferDownloadTarget(source) {
      const match = source.match(/下载\s*([^，,。；\s]{2,12})/);
      return match ? match[1] : "";
    }

    function inferReward(source, context) {
      const text = `${source} ${context}`;
      const match = text.match(/(?:领(?:取)?|得|获得|获赠|送)\s*([^，,。；\s]{2,12})/);
      if (!match) return "";
      const reward = match[1].replace(/app$/i, "").trim();
      return /^\d+(?:\.\d+)?元$/.test(reward) ? `${reward}优惠券` : reward;
    }

    function inferConcreteBenefitTerms(source, context, benefit, reward) {
      const text = `${source} ${context} ${benefit}`;
      const terms = text.match(/\d+(?:\.\d+)?\s*元(?:优惠券|红包|券|补贴|立减)?/g) || [];
      const normalized = terms.map((term) => term.replace(/\s+/g, ""));
      if (reward) normalized.push(reward);
      return uniqueList(normalized.map((term) => {
        if (/^\d+(?:\.\d+)?元$/.test(term) && new RegExp(`(?:领(?:取)?|得|获得|获赠|送)\\s*${term}`).test(text)) {
          return `${term}优惠券`;
        }
        return term;
      }));
    }

    function downloadCampaignCandidates(data) {
      const reward = data.reward || "专属好礼";
      return [
        `下载${data.downloadTarget}，领取${reward}`,
        `下载${data.downloadTarget}，${reward}等你领`,
        `立即下载${data.downloadTarget}，领取${reward}`,
        `${data.downloadTarget}，下载即领${reward}`
      ];
    }

    function inferEvent(source, core) {
      const normalized = normalizeCopy(source)
        .replace(/^系统(?:出现)?异常[，,]?/, "")
        .replace(/^当前/, "")
        .trim();
      const failure = normalized.match(/([^，。；]{2,18}(?:失败|错误|不可用|未开启|已失效))/);
      if (failure) return failure[1].replace(/^你的/, "");
      if (/网络/.test(source)) return "网络连接失败";
      if (/失败|错误|异常/.test(source) && core && core !== "这项内容") return `${core}失败`;
      return normalized || `${core}暂时不可用`;
    }

    function namingCandidates(scenario, data) {
      const evidence = `${data.source} ${data.context} ${data.benefit}`;
      if (scenario.id === "function" && /浏览|看过|足迹/.test(evidence)) {
        return [data.core, "浏览记录", "浏览足迹", "最近浏览"];
      }
      return scenario.templates.map((template) => fillTemplate(template, data));
    }

    function fillTemplate(template, data) {
      return template
        .replaceAll("{core}", data.core)
        .replaceAll("{benefit}", data.benefit)
        .replaceAll("{action}", data.action)
        .replaceAll("{event}", data.event);
    }

    function scoreSuggestion(text, data, index, category, scenario) {
      const evidence = `${data.source} ${data.context} ${data.core} ${data.benefit} ${data.action}`;
      const benefitSignal = fitLimit(data.benefit, data.limit);
      let score = 10 - index * 0.2;
      if (data.core && text.includes(data.core)) score += 8;
      if (data.offer && text.includes(data.offer)) score += 9;
      if (data.channel && text.includes(data.channel)) score += 6;
      if (data.downloadTarget && text.includes(data.downloadTarget)) score += 8;
      if (data.reward && text.includes(data.reward)) score += 8;
      if (data.event && text.includes(data.event)) score += 8;
      const benefitWeight = scenario.id === "empty" ? 3 : 7;
      if (data.benefit && text.includes(data.benefit)) score += benefitWeight;
      else if (benefitSignal && text.includes(benefitSignal)) score += Math.max(2, benefitWeight - 1);
      const actionWeight = scenario.id === "empty" ? 7 : (scenario.id === "scene_seed" ? 1 : 5);
      if (data.action && text.includes(data.action)) score += actionWeight;
      if (scenario.id === "scene_seed" && text.startsWith(data.action)) score -= 3;
      if (/已到账|已通过|已提交|失败|为空|未开启/.test(text)) score += 2;
      if (/OK|平台|后台流转|错误码/.test(text)) score -= 8;
      if (/全网最低|历史最低|销量第一|必达|必赔|无条件|一定见效/.test(text)) score -= 24;
      if ((text.match(/，/g) || []).length > 2) score -= 3;
      ["新手", "周末", "限时", "手慢", "恭喜"].forEach((word) => {
        if (text.includes(word) && !evidence.includes(word)) score -= 6;
      });
      const max = getMaxLength(data.limit);
      if (max && text.length > max) score -= 20;
      return score;
    }

    function buildSuggestions(category, scenario, data) {
      let rawSuggestions;
      if (data.risk.blocked) {
        rawSuggestions = complianceCandidates(data);
      } else if (data.notificationCampaign) {
        rawSuggestions = notificationCampaignCandidates(data.notificationCampaign);
      } else if (category.id === "service" && data.arrival) {
        rawSuggestions = arrivalCandidates(data.arrival);
      } else if (category.id === "marketing" && data.downloadTarget) {
        rawSuggestions = downloadCampaignCandidates(data);
      } else if (category.id === "marketing" && data.offer && /优惠券|红包|补贴|券后|领券/.test(`${data.source} ${data.context} ${data.benefit}`)) {
        rawSuggestions = marketingClaimCandidates(data);
      } else if (category.id === "naming") {
        rawSuggestions = namingCandidates(scenario, data);
      } else if (category.id === "marketing" && scenario.id === "scene_seed") {
        rawSuggestions = sceneSeedCandidates(data);
      } else if (scenario.id === "empty") {
        rawSuggestions = [
          `${data.core}还是空的，${data.action}`,
          `${data.core}还是空的哦`,
          `${data.action}，${data.benefit}`,
          `把喜欢的商品放进${data.core}，${data.benefit}`
        ];
      } else {
        rawSuggestions = scenario.templates.map((template) => fillTemplate(template, data));
      }

      const suggestions = uniqueList(rawSuggestions
        .map((item) => fitLimit(item, data.limit))
        .filter(Boolean)
        .map((item) => ensureKeepTerms(item, data.keepTerms)));
      return suggestions
        .map((text, index) => ({ text, score: scoreSuggestion(text, data, index, category, scenario) }))
        .sort((a, b) => b.score - a.score)
        .slice(0, 4)
        .map((item) => item.text);
    }

    function renderCategories() {
      categoryList.innerHTML = categories.map((item, index) => `
        <button class="category-card ${item.id === activeId ? "active" : ""}" data-id="${item.id}" type="button">
          <span class="category-index">${String(index + 1).padStart(2, "0")}</span>
          <span>
            <span class="category-name">${item.name}</span>
            <span class="category-desc">${item.desc}</span>
          </span>
        </button>
      `).join("");
    }

    function renderDetail(keepSelected = false) {
      const current = activeCategory();
      const selected = sceneSelect.value;
      sceneSelect.innerHTML = current.scenarios
        .map((scene) => `<option>${escapeHtml(scene.name)}</option>`)
        .join("");
      if (keepSelected && current.scenarios.some((scene) => scene.name === selected)) {
        sceneSelect.value = selected;
      }
      renderSceneMenu();
    }

    function renderSceneMenu() {
      const current = activeCategory();
      sceneValue.textContent = sceneSelect.value;
      sceneList.innerHTML = current.scenarios.map((scene) => `
        <button class="select-option" type="button" role="option" data-value="${escapeHtml(scene.name)}" aria-selected="${scene.name === sceneSelect.value}">
          ${escapeHtml(scene.name)}
        </button>
      `).join("");
    }

    function setSceneMenuOpen(open, focusSelected = false) {
      scenePopover.hidden = !open;
      sceneTrigger.setAttribute("aria-expanded", String(open));
      if (open && focusSelected) {
        const selected = sceneList.querySelector('[aria-selected="true"]');
        if (selected) selected.focus();
      }
    }

    function generatePrompt() {
      let current = activeCategory();
      let scene = activeScenario();
      const source = copyInput.value.trim();
      const context = contextInput.value.trim();
      const limit = limitInput.value.trim() || "无明确限制";
      const downloadTarget = inferDownloadTarget(source);
      const reward = inferReward(source, context);
      const arrival = inferArrival(source, context);
      const explicitKeepTerms = parseKeepTerms(keepInput.value);
      const inferredBenefitTerms = inferConcreteBenefitTerms(source, context, benefitInput.value, reward);
      const keepTerms = uniqueList([...explicitKeepTerms, ...inferredBenefitTerms]);
      const notificationCampaign = inferNotificationCampaign(source, context);
      if (notificationCampaign) {
        current = categories.find((item) => item.id === "marketing") || current;
        scene = current.scenarios.find((item) => item.id === "subsidy") || current.scenarios[0];
      } else if (current.id === "marketing" && downloadTarget) {
        scene = current.scenarios.find((item) => item.id === "operation") || scene;
      } else if (current.id === "marketing" && /优惠券|红包|补贴|券后|领券/.test(`${source} ${context} ${benefitInput.value}`)) {
        scene = current.scenarios.find((item) => item.id === "subsidy") || scene;
      }
      const data = {
        core: notificationCampaign ? notificationCampaign.subject : (arrival ? arrival.subject : inferCore(source, context, keepTerms[0] || "")),
        benefit: notificationCampaign ? `领取${notificationCampaign.reward}` : (arrival ? `${arrival.time}后到账` : (downloadTarget && reward ? `领取${reward}` : (benefitInput.value.trim() || scene.sample.benefit))),
        action: actionInput.value.trim() || (notificationCampaign ? "开启消息通知" : (arrival ? "无需操作" : (downloadTarget ? "下载" : scene.sample.action))),
        source,
        context,
        downloadTarget,
        reward,
        arrival,
        notificationCampaign,
        keepTerms,
        limit
      };
      data.touchpointRole = inferTouchpointRole(limit, context, source);
      data.risk = analyzeCommerceRisk(source, context, keepTerms);
      data.offer = inferOffer(source, context, data.benefit);
      data.channel = inferChannel(source, context);
      data.required = data.keepTerms.length
        ? data.keepTerms.join("、")
        : data.notificationCampaign
        ? `${data.notificationCampaign.subject}、${data.notificationCampaign.reward}`
        : data.arrival
        ? `${data.arrival.subject}、${data.arrival.time}后到账`
        : data.downloadTarget
        ? [data.downloadTarget, data.reward].filter(Boolean).join("、")
        : data.offer
        ? [data.channel, data.offer].filter(Boolean).join("、")
        : data.core;
      data.event = inferEvent(source, data.core);
      const suggestions = buildSuggestions(current, scene, data);
      const recommendationLines = suggestions.map((item, index) => `${index + 1}. ${item}`).join("\n");
      const ruleLines = [
        `先按“${data.touchpointRole}”判断这段文案的任务。`,
        ...scene.rules,
        "候选文案使用不同策略，不只替换同义词。"
      ].map((rule) => `- ${rule}`).join("\n");
      const riskSection = data.risk.note ? `\n\n风险提示：${data.risk.note}` : "";

      resultBox.classList.remove("empty");
      resultBox.textContent =
`分类：${current.name} / ${scene.name}

输入识别：
- 必须保留：${data.required}
- 触点角色：${data.touchpointRole}
- 用户收益：${data.benefit}
- 用户下一步：${data.action}
- 位置限制：${limit}

规范依据：
${ruleLines}

推荐文案：
${recommendationLines}${riskSection}

首选：${suggestions[0]}
理由：保留核心信息“${data.required}”，优先说明用户收益“${data.benefit}”，并适配“${data.touchpointRole}”和“${limit}”。

自检：已按“简单、可靠、亲切”处理；必须保留的词为硬约束，用户下一步仅作为生成依据，不做机械拼接。`;
    }

    function resetForm() {
      copyInput.value = "";
      contextInput.value = "";
      limitInput.value = "";
      benefitInput.value = "";
      actionInput.value = "";
      keepInput.value = "";
      resultBox.classList.add("empty");
      resultBox.textContent = "生成后，这里会直接出现可用的优化文案。";
    }

    function fillSample() {
      const scene = activeScenario();
      limitInput.value = scene.sample.limit;
      keepInput.value = scene.sample.keep;
      benefitInput.value = scene.sample.benefit;
      actionInput.value = scene.sample.action;
      copyInput.value = scene.sample.copy;
      contextInput.value = scene.sample.context;
      generatePrompt();
      showToast("已填入示例");
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 1400);
    }

    categoryList.addEventListener("click", (event) => {
      const button = event.target.closest(".category-card");
      if (!button) return;
      activeId = button.dataset.id;
      renderCategories();
      renderDetail();
      if (!resultBox.classList.contains("empty")) {
        generatePrompt();
      }
    });

    sceneSelect.addEventListener("change", () => {
      renderDetail(true);
      if (!resultBox.classList.contains("empty")) {
        generatePrompt();
      }
    });

    sceneTrigger.addEventListener("click", () => {
      setSceneMenuOpen(scenePopover.hidden, true);
    });

    sceneTrigger.addEventListener("keydown", (event) => {
      if (["ArrowDown", "ArrowUp"].includes(event.key)) {
        event.preventDefault();
        setSceneMenuOpen(true, true);
      }
      if (event.key === "Escape") setSceneMenuOpen(false);
    });

    sceneList.addEventListener("click", (event) => {
      const option = event.target.closest(".select-option");
      if (!option) return;
      sceneSelect.value = option.dataset.value;
      sceneSelect.dispatchEvent(new Event("change", { bubbles: true }));
      setSceneMenuOpen(false);
      sceneTrigger.focus();
    });

    sceneList.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        setSceneMenuOpen(false);
        sceneTrigger.focus();
        return;
      }
      if (!["ArrowDown", "ArrowUp"].includes(event.key)) return;
      event.preventDefault();
      const options = [...sceneList.querySelectorAll(".select-option")];
      const currentIndex = options.indexOf(document.activeElement);
      const direction = event.key === "ArrowDown" ? 1 : -1;
      const nextIndex = (currentIndex + direction + options.length) % options.length;
      options[nextIndex].focus();
    });

    document.addEventListener("click", (event) => {
      if (!scenePicker.contains(event.target)) setSceneMenuOpen(false);
    });

    document.getElementById("generateBtn").addEventListener("click", generatePrompt);
    document.getElementById("resetBtn").addEventListener("click", resetForm);
    document.getElementById("resetTopBtn").addEventListener("click", resetForm);
    document.getElementById("sampleBtn").addEventListener("click", fillSample);
    document.getElementById("copyBtn").addEventListener("click", async () => {
      const text = resultBox.textContent.trim();
      if (!text || resultBox.classList.contains("empty")) {
        showToast("还没有可复制内容");
        return;
      }
      await navigator.clipboard.writeText(text);
      showToast("已复制");
    });

    renderCategories();
    renderDetail();
  </script>
</body>
</html>
